<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Members Lounge – Stock Take</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .category-header { background: linear-gradient(to right, #111827, #1f2937); }
        .product-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .product-card:hover { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); transform: translateY(-2px); }
        /* Sticky positioning */
        .sticky-toolbar {
            position: sticky;
            top: 0;
            z-index: 50;
            background: white;
            padding-top: 0.5rem;
            padding-bottom: 0.5rem;
            margin-top: -0.5rem;
        }
        .sticky-nav {
            position: sticky;
            top: 80px; /* Height of toolbar approx */
            z-index: 40;
            background: white;
        }
        .category-section {
            scroll-margin-top: 140px; /* Enough to clear both sticky bars */
        }
        @media print {
            .no-print { display: none !important; }
            .category-header { background: #111827 !important; color: white !important; -webkit-print-color-adjust: exact; }
            .product-card { border: 1px solid #ddd !important; box-shadow: none !important; break-inside: avoid; }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-12">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

        <!-- Header -->
        <div class="bg-white rounded-3xl shadow-sm overflow-hidden mb-8 no-print">
            <div class="bg-zinc-950 text-white px-8 py-10 flex items-center gap-6">
                <div class="w-16 h-16 bg-white text-zinc-950 rounded-2xl flex items-center justify-center text-4xl font-bold">TML</div>
                <div>
                    <h1 class="text-3xl font-bold tracking-tight">The Members Lounge</h1>
                    <p class="text-zinc-400 mt-1">Professional Stock Take System</p>
                </div>
            </div>
        </div>

        <!-- Info Bar (date & staff) - also sticky but below toolbar? We'll keep it in normal flow but with a background -->
        <div class="bg-white rounded-3xl shadow-sm p-8 mb-8 no-print">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">📅 Stock Take Date</label>
                    <input type="date" id="stockDate" class="w-full px-5 py-3.5 bg-gray-50 border border-gray-200 rounded-2xl focus:outline-none focus:border-zinc-400 text-lg">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">👤 Performed By</label>
                    <select id="staffName" class="w-full px-5 py-3.5 bg-gray-50 border border-gray-200 rounded-2xl focus:outline-none focus:border-zinc-400 text-lg">
                        <option value="">-- Select your name --</option>
                        <option value="Carlo P">Carlo P</option>
                        <option value="Peter H">Peter H</option>
                        <option value="Rohitha PR">Rohitha PR</option>
                        <option value="Nam L">Nam L</option>
                        <option value="Michelle P">Michelle P</option>
                        <option value="Remzi A">Remzi A</option>
                        <option value="Ralph M">Ralph M</option>
                        <option value="Laura P">Laura P</option>
                        <option value="Stevan B">Stevan B</option>
                        <option value="Tony B">Tony B</option>
                    </select>
                </div>
                <div id="infoWarning" class="text-red-600 text-sm font-medium self-end"></div>
            </div>
        </div>

        <!-- STICKY TOOLBAR (buttons) -->
        <div class="sticky-toolbar no-print">
            <div class="flex flex-wrap gap-3 mb-3">
                <button onclick="resetAll()" class="flex-1 sm:flex-none bg-red-600 hover:bg-red-700 text-white px-6 py-4 rounded-2xl font-semibold flex items-center justify-center gap-2">
                    🗑️ Reset All
                </button>
                <button onclick="showPreview()" class="flex-1 sm:flex-none bg-zinc-800 hover:bg-black text-white px-6 py-4 rounded-2xl font-semibold flex items-center justify-center gap-2">
                    📄 Preview
                </button>
                <button onclick="printPDF()" class="flex-1 sm:flex-none bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-4 rounded-2xl font-semibold flex items-center justify-center gap-2">
                    🖨️ Print PDF
                </button>
                <button onclick="exportCSV()" class="flex-1 sm:flex-none bg-blue-600 hover:bg-blue-700 text-white px-6 py-4 rounded-2xl font-semibold flex items-center justify-center gap-2">
                    📊 Export CSV
                </button>
            </div>
            <div class="flex flex-wrap gap-3 mb-3">
                <button onclick="saveToLocal()" class="bg-amber-600 hover:bg-amber-700 text-white px-6 py-3 rounded-2xl font-medium">💾 Save Now</button>
                <button onclick="loadFromLocal()" class="bg-teal-600 hover:bg-teal-700 text-white px-6 py-3 rounded-2xl font-medium">📂 Load Saved</button>
                <button onclick="clearAllData()" class="bg-gray-600 hover:bg-gray-700 text-white px-6 py-3 rounded-2xl font-medium">Clear All Data</button>
            </div>
        </div>

        <!-- Live Counter + Search (below sticky toolbar) -->
        <div class="mb-8 no-print flex flex-col sm:flex-row gap-4 items-center mt-4">
            <div id="liveCounter" class="bg-white px-6 py-3 rounded-3xl font-semibold text-lg border border-gray-200 flex-1 text-center sm:text-left">
                0 items with stock > 0
            </div>
            <input id="searchInput" type="text" placeholder="🔍 Search products (real-time)..." 
                   onkeyup="debouncedFilter()" 
                   class="flex-1 px-6 py-4 bg-white border border-gray-200 rounded-3xl text-lg focus:outline-none focus:border-zinc-400">
        </div>

        <!-- STICKY CATEGORY NAVIGATION -->
        <div id="categoryNav" class="sticky-nav flex flex-wrap gap-2 mb-10 no-print bg-white p-4 rounded-3xl shadow-sm"></div>

        <!-- Summary Preview -->
        <div id="summaryPreview" class="hidden bg-white rounded-3xl shadow-sm p-8 mb-10">
            <h2 class="text-2xl font-semibold mb-6">📋 Stock Take Summary</h2>
            <pre id="reportContent" class="bg-gray-50 p-8 rounded-2xl text-sm leading-relaxed overflow-auto max-h-[65vh] font-mono whitespace-pre-wrap"></pre>
        </div>

        <!-- Categories Container -->
        <div id="categoriesContainer" class="space-y-10"></div>

        <div class="text-center text-gray-500 text-sm mt-16 no-print">
            Auto-saves every change • Search is now smoother (debounced)<br>
            Green Beans included • "buckets" unit available
        </div>
    </div>

<script>
// ==================== DATA ====================
const baseCategories = [ 
    { name: "🥩 Meats", products: ["Sausages","Chicken","Lamb Shanks","Steak","Ragu Meat - Tray","Prosciutto","Mortadella","Ham","Salami"] },
    { name: "🐟 Seafood", products: ["Fish","Calamari","Prawns","Anchovies"] },
    { name: "🥛 Dairy", products: ["Butter block","Butter PC","Ricotta","Parmesan","Bocconcini","Mozzarella","Milk (3L)"] },
    { name: "🥖 Bakery", products: ["Bruschetta Bread","Gluten‑free bread"] },
    { name: "🍎 Fruit & Vegetables", products: ["Avocado","Basil","Broccoli","Capsicums Pizza","Carrots","Cauliflower","Celery","Eggplant","Garlic","Green Beans","Lemon","Mushrooms","Onion","Oranges","Parsley","Pineapple","Potatoes","Pumpkin","Rocket","Rosemary","Salad Mix","Strawberries","Tomatoes","Watermelon","Zucchini"] },
    { name: "📦 Dry Goods", products: ["Artichokes","Breadcrumbs - Panko","Capsicums (tin)","Chicken Nuggets (50/pack)","Chili Flakes","Coffee Espresso (1kg bag)","Frozen Chips","Gluten free Gnocchi (400g)","Olive Oil (10L box)","Olive Oil (20L drum)","Olives (Antipasto)","Olives (Pizza)","Oregano","Pasta Divella Elicoidali","Peeled Tomato's (box of 6)","Pizza Flour (12.5kg)","Red Wine Vinegar (5L)","Rice Flour (25kg)","Salt","Sugar","Sugar Sachet (2000x3g)","Tomato Sauce PC","Yeast"] },
    { name: "🧾 Paper Goods & Cleaning/Toiletries", products: ["5L Soap","25L Metho","Baking Paper roll","Bin Liners (72L)","Chux Roll","Dishwashing Liquid (25L)","Foil (3kg)","Gladwrap","Handtowels","Large Nitra Gloves","Mop Head & Handle","Ribbed Containers","Ribbed Lids","Scourer Sponge","Serviettes (1000/box)","Straws","Table Paper (100 sheets)","Thermal Printer Rolls","Thermal Rolls Eftpos","Toilet Rolls (jumbo)","Toilet Tablets","Wooden Stirrers"] },
    { name: "🍺 Beer & Cider", products: ["Carlton Draught","Cascade Light","Corona Extra","Peroni Red","VB"] },
    { name: "🍷 Wines", products: ["Brown Brothers Prosecco (200ml)","Brown Brothers Prosecco (750ml)","La Gioiosa Prosecco","Warburn Cabernet Sauvignon","Warburn Chardonnay","Warburn Merlot","Warburn Moscato","Warburn Pinot Grigio","Warburn Pinot Noir","Warburn Rosé","Warburn Sauvignon Blanc","Warburn Shiraz"] },
    { name: "🥃 Spirits & Liqueurs", products: ["Angostura Bitters","Aperol Aperitivo","Aperol Spritz (175ml pack)","Apple cider Sommersby","Apple juice","Aranciatta Rosa","Baileys Irish Cream","Bacardi Rum","Bundaberg Rum","Campari","Canadian Club Whiskey","Captain Morgan Black Rum","Chinotto","Chivas Regal","Cinzano Extra Dry Vermouth","Cinzano Sweet Vermouth","Cognac Remy VSOP","Cointreau","Frangelico","Gordons Dry Gin","Grapa Piave","Jack Daniels","Jim Bean White","Johny Walker Black","Johny Walker Red","Jose Cuervo Tequila","Kahlua","Lime cordial","Limoncello Strega","Malibu","Montenegro","Orange juice","Penfolds Club Tawny Port","Pineapple juice","Raspberry cordial","Sambuca Molinaro","Smirnoff Red Vodka","Southern Comfort","Suntory Midori","Vecchio Amaro del Capo"] },
    { name: "🍰 Dessert", products: ["Cannoli Cream (2.5kg)","Cannoli shells Medium","Cannolis shells Small","Gelato","Strawberry Dixie Cups","Vanilla Choc coated Ice creams"] }
];

baseCategories.forEach(cat => cat.products.sort((a,b) => a.localeCompare(b)));

const unitOptions = ["each","units","grams (g)","kilograms (kg)","litres","boxes","bottles","packets","bags","cartons","trays","jars","tins","drums","loaves","punnets","bunches","dozens","buckets"];

let stockData = {};
let miscProducts = [];
let searchTimeout = null;

// ==================== LOCALSTORAGE ====================
const STORAGE_KEY = "tml_stocktake_data";

function saveToLocal() {
    const data = { stockData, miscProducts, date: document.getElementById("stockDate").value, staff: document.getElementById("staffName").value };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    alert("✅ Stock saved");
}

function loadFromLocal() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) return alert("No saved data found");
    const data = JSON.parse(saved);
    stockData = data.stockData || {};
    miscProducts = data.miscProducts || [];
    if (data.date) document.getElementById("stockDate").value = data.date;
    if (data.staff) document.getElementById("staffName").value = data.staff;
    render();
    updateLiveCounter();
    alert("✅ Saved data loaded");
}

function clearAllData() {
    if (!confirm("Delete ALL saved data?")) return;
    localStorage.removeItem(STORAGE_KEY);
    location.reload();
}

function autoSave() {
    saveToLocal();
    updateLiveCounter();
}

// ==================== RENDER ====================
function render() {
    const container = document.getElementById("categoriesContainer");
    const nav = document.getElementById("categoryNav");
    container.innerHTML = "";
    nav.innerHTML = "";

    const filter = (document.getElementById("searchInput")?.value || "").toLowerCase().trim();

    const allCats = [...baseCategories, { name: "➕ Miscellaneous", products: miscProducts }];

    // Navigation
    allCats.forEach(cat => {
        const id = cat.name.replace(/[^a-zA-Z0-9]/g, '');
        const btn = document.createElement("a");
        btn.href = `#${id}`;
        btn.className = "px-5 py-2.5 bg-white border border-gray-200 hover:border-zinc-300 rounded-2xl text-sm font-medium transition-colors";
        btn.textContent = cat.name;
        btn.onclick = (e) => { 
            e.preventDefault(); 
            const target = document.getElementById(id);
            if (target) target.scrollIntoView({ behavior: "smooth" }); 
        };
        nav.appendChild(btn);
    });

    allCats.forEach(cat => {
        const id = cat.name.replace(/[^a-zA-Z0-9]/g, '');
        const isMisc = cat.name === "➕ Miscellaneous";

        const section = document.createElement("div");
        section.id = id;
        section.className = "bg-white rounded-3xl shadow-sm overflow-hidden category-section";

        const header = document.createElement("div");
        header.className = "category-header px-8 py-6 text-white text-2xl font-semibold";
        header.textContent = cat.name;
        section.appendChild(header);

        const grid = document.createElement("div");
        grid.className = "grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 p-8";

        let visible = 0;
        cat.products.forEach(prod => {
            if (filter && !prod.toLowerCase().includes(filter)) return;
            grid.appendChild(createProductCard(prod, isMisc));
            visible++;
        });

        if (visible === 0 && filter) {
            grid.innerHTML = `<p class="col-span-full text-center text-gray-500 py-12">No products match your search</p>`;
        }

        section.appendChild(grid);
        container.appendChild(section);
    });

    updateLiveCounter();
}

function createProductCard(product, isMisc) {
    const data = stockData[product] || { qty: 0, unit: "each" };
    const card = document.createElement("div");
    card.className = "product-card bg-gray-50 border border-gray-100 rounded-2xl p-6";

    const qtyHTML = product === "Sausages" ? `
        <div class="flex items-center bg-white border border-gray-200 rounded-2xl overflow-hidden">
            <button onclick="changeSausages('${product}', -10)" class="w-12 h-12 text-2xl font-light text-gray-600 hover:bg-gray-100 active:bg-gray-200">-</button>
            <input type="number" value="${data.qty}" min="0" max="500" step="10"
                   onchange="setQuantity('${product}', this.value)" 
                   class="w-20 text-center font-semibold text-lg bg-transparent focus:outline-none">
            <button onclick="changeSausages('${product}', 10)" class="w-12 h-12 text-2xl font-light text-gray-600 hover:bg-gray-100 active:bg-gray-200">+</button>
        </div>` : `
        <select onchange="setQuantity('${product}', this.value)" class="bg-white border border-gray-200 rounded-2xl px-4 py-3 font-medium focus:outline-none w-full">
            ${Array.from({length:51}, (_,i) => `<option value="${i}" ${i===data.qty?'selected':''}>${i}</option>`).join('')}
        </select>`;

    card.innerHTML = `
        <div class="flex justify-between items-start mb-4">
            <div class="font-semibold text-lg leading-tight">${product}</div>
            ${isMisc ? `<button onclick="deleteMiscProduct('${product}')" class="text-red-500 hover:text-red-700 text-xl leading-none">✕</button>` : ''}
        </div>
        <div class="flex items-center gap-4">
            ${qtyHTML}
            <select onchange="changeUnit('${product}', this.value)" class="bg-white border border-gray-200 rounded-2xl px-4 py-3 text-sm focus:outline-none">
                ${unitOptions.map(u => `<option value="${u}" ${u===data.unit?'selected':''}>${u}</option>`).join('')}
            </select>
        </div>
    `;
    return card;
}

function changeSausages(product, delta) {
    let current = (stockData[product] && stockData[product].qty) || 0;
    setQuantity(product, current + delta);
}

function setQuantity(product, value) {
    let val = parseInt(value) || 0;
    const max = product === "Sausages" ? 500 : 50;
    if (!stockData[product]) stockData[product] = { qty: 0, unit: "each" };
    stockData[product].qty = Math.max(0, Math.min(max, val));
    autoSave();
    updateLiveCounter();
}

function changeUnit(product, unit) {
    if (!stockData[product]) stockData[product] = { qty: 0, unit: "each" };
    stockData[product].unit = unit;
    autoSave();
}

function updateLiveCounter() {
    let count = 0;
    Object.values(stockData).forEach(item => { if (item.qty > 0) count++; });
    document.getElementById("liveCounter").textContent = `${count} items with stock > 0`;
}

function debouncedFilter() {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
        render();
    }, 180);
}

function addMiscProduct() {
    const name = prompt("Enter new product name:");
    if (!name || !name.trim()) return;
    const cleanName = name.trim();
    if (miscProducts.includes(cleanName)) return alert("Product already exists");
    miscProducts.push(cleanName);
    stockData[cleanName] = { qty: 0, unit: "each" };
    render();
    autoSave();
}

function deleteMiscProduct(name) {
    if (!confirm(`Delete ${name}?`)) return;
    miscProducts = miscProducts.filter(p => p !== name);
    delete stockData[name];
    render();
    autoSave();
}

function resetAll() {
    if (!confirm("Reset ALL quantities to zero?")) return;
    Object.keys(stockData).forEach(k => { if (stockData[k]) stockData[k].qty = 0; });
    render();
    autoSave();
}

function validateAndGetInfo() {
    const date = document.getElementById("stockDate").value;
    const staff = document.getElementById("staffName").value;
    const warning = document.getElementById("infoWarning");
    if (!date || !staff) {
        warning.textContent = "⚠️ Please fill Date and Staff name";
        return null;
    }
    warning.textContent = "";
    return { date, staff };
}

function getFullStockTakeReport(info) {
    let report = `THE MEMBERS LOUNGE – STOCK TAKE REPORT\nDate: ${info.date}\nPerformed by: ${info.staff}\nGenerated: ${new Date().toLocaleString()}\n=========================================\n\n`;
    baseCategories.forEach(cat => {
        let has = false;
        let sec = `${cat.name}\n`;
        cat.products.forEach(p => {
            const d = stockData[p];
            if (d && d.qty > 0) { sec += `   • ${p}: ${d.qty} ${d.unit}\n`; has = true; }
        });
        if (has) report += sec + "\n";
    });
    if (miscProducts.length) {
        let has = false;
        let sec = `Miscellaneous\n`;
        miscProducts.forEach(p => {
            const d = stockData[p];
            if (d && d.qty > 0) { sec += `   • ${p}: ${d.qty} ${d.unit}\n`; has = true; }
        });
        if (has) report += sec + "\n";
    }
    return report;
}

function showPreview() {
    const info = validateAndGetInfo();
    if (!info) return;
    document.getElementById("reportContent").textContent = getFullStockTakeReport(info);
    document.getElementById("summaryPreview").classList.remove("hidden");
    document.getElementById("summaryPreview").scrollIntoView({ behavior: "smooth" });
}

function printPDF() {
    const info = validateAndGetInfo();
    if (!info) return;
    const win = window.open('', '_blank');
    win.document.write(`<html><head><title>Stock Take ${info.date}</title><style>body{font-family:monospace;margin:40px;line-height:1.5;}h1{border-bottom:3px solid black;padding-bottom:10px;}</style></head><body><h1>The Members Lounge – Stock Take</h1><pre>${getFullStockTakeReport(info)}</pre></body></html>`);
    win.document.close();
    setTimeout(() => win.print(), 600);
}

function exportCSV() {
    const info = validateAndGetInfo();
    if (!info) return;
    let csv = `Stock Take Date,${info.date}\nPerformed By,${info.staff}\n\nProduct,Quantity,Unit\n`;
    baseCategories.forEach(cat => cat.products.forEach(p => {
        const d = stockData[p];
        if (d && d.qty > 0) csv += `"${p}",${d.qty},"${d.unit}"\n`;
    }));
    miscProducts.forEach(p => {
        const d = stockData[p];
        if (d && d.qty > 0) csv += `"${p}",${d.qty},"${d.unit}"\n`;
    });
    const blob = new Blob([csv], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `TML_StockTake_${info.date}.csv`;
    a.click();
}

// ==================== INIT ====================
document.getElementById("stockDate").value = new Date().toISOString().split('T')[0];

baseCategories.forEach(cat => {
    cat.products.forEach(prod => stockData[prod] = { qty: 0, unit: "each" });
});

render();

if (localStorage.getItem(STORAGE_KEY)) {
    setTimeout(() => {
        if (confirm("Previous stock take data found. Load it now?")) loadFromLocal();
    }, 600);
}
</script>
</body>
</html>
